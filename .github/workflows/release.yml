name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: app

      - name: Build Tauri app
        run: npm run tauri:build
        working-directory: app

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Copy standalone binary with version name
        shell: bash
        run: cp target/release/bitcord-tauri.exe "target/release/bitcord-${{ steps.version.outputs.VERSION }}.exe"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/msi/BitCord_${{ steps.version.outputs.VERSION }}_x64_en-US.msi
            target/release/bundle/nsis/BitCord_${{ steps.version.outputs.VERSION }}_x64-setup.exe
            target/release/bitcord-${{ steps.version.outputs.VERSION }}.exe
